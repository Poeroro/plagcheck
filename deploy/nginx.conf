# Nginx reverse proxy config for PlagCheck
# /etc/nginx/sites-available/plagcheck

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name plagcheck.tempmeil.xyz;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name plagcheck.tempmeil.xyz;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/plagcheck.tempmeil.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plagcheck.tempmeil.xyz/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # File upload (PDF, DOCX, TXT)
    client_max_body_size 50M;
    client_body_timeout 600s;

    # Proxy settings
    location / {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # Long timeout for plagiarism checking (semantic can take 30s+)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Static files (cache aggressively)
    location /static/ {
        proxy_pass http://127.0.0.1:8200/static/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
